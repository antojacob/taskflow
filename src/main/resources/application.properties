# Server Port
server.port=8080

# Database Configuration (Matches Docker setup)
spring.datasource.url=jdbc:postgresql://localhost:5432/taskflow_db
spring.datasource.username=postgres
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (Temporary for Phase 1)
app.jwt.secret=TaskFlowSecretKeyMustBeLongEnoughForSecurity123456789
app.jwt.expiration=86400000